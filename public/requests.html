<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resource Requests on Community Connect - Submit, approve, and fulfill resource requests from NGOs.">
  <title>Requests - Community Connect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <span class="brand-icon">🤝</span>
        Community Connect
      </a>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="donations.html">Donations</a></li>
        <li><a href="ngos.html">NGOs</a></li>
        <li><a href="requests.html" class="active">Requests</a></li>
        <li><a href="volunteers.html">Activities</a></li>
        <li><a href="impact.html">Impact</a></li>
      </ul>
      <div class="nav-user">
        <div>
          <div class="user-name" id="userName">User</div>
          <div class="user-role" id="userRole">Role</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <aside class="sidebar">
      <div class="sidebar-section-title">Main</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
        <li><a href="donations.html"><span class="nav-icon">🎁</span> Donations</a></li>
        <li><a href="ngos.html"><span class="nav-icon">🏢</span> NGOs</a></li>
        <li><a href="requests.html" class="active"><span class="nav-icon">📋</span> Requests</a></li>
        <li><a href="volunteers.html"><span class="nav-icon">🙋</span> Activities</a></li>
        <li><a href="impact.html"><span class="nav-icon">🌍</span> Impact</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
        <div>
          <h1>📋 Resource Requests</h1>
          <p>Submit, approve, and fulfill resource needs</p>
        </div>
        <button class="btn btn-primary" id="addRequestBtn" onclick="openRequestModal()" style="display:none;">+ New Request</button>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <select class="form-control" id="filterCategory" onchange="loadRequests()">
          <option value="">All Categories</option>
          <option value="food">🍽️ Food</option>
          <option value="clothes">👕 Clothes</option>
          <option value="education">📚 Education</option>
          <option value="medical">💊 Medical</option>
          <option value="other">📦 Other</option>
        </select>
        <select class="form-control" id="filterStatus" onchange="loadRequests()">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="fulfilled">Fulfilled</option>
          <option value="rejected">Rejected</option>
        </select>
        <select class="form-control" id="filterUrgency" onchange="loadRequests()">
          <option value="">All Urgency</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>

      <!-- Requests Grid -->
      <div class="data-grid" id="requestsGrid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <!-- Create Request Modal -->
  <div class="modal-overlay" id="requestModal">
    <div class="modal">
      <div class="modal-header">
        <h2>New Resource Request</h2>
        <button class="modal-close" onclick="closeRequestModal()">✕</button>
      </div>
      <form id="requestForm">
        <div class="form-group">
          <label class="form-label" for="reqTitle">Title</label>
          <input type="text" id="reqTitle" class="form-control" placeholder="e.g., Educational supplies for school" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reqCategory">Category</label>
          <select id="reqCategory" class="form-control" required>
            <option value="food">Food</option>
            <option value="clothes">Clothes</option>
            <option value="education">Education</option>
            <option value="medical">Medical</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="reqDescription">Description</label>
          <textarea id="reqDescription" class="form-control" placeholder="Describe the need in detail..." required></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="form-group">
            <label class="form-label" for="reqQuantity">Quantity Needed</label>
            <input type="number" id="reqQuantity" class="form-control" placeholder="50" min="1" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reqUrgency">Urgency</label>
            <select id="reqUrgency" class="form-control" required>
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Submit Request</button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/requests.js"></script>
</body>
</html>
