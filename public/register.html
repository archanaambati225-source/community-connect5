<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for Community Connect - Join as a Donor, NGO, Volunteer, or Admin to start making a social impact.">
  <title>Register - Community Connect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="navbar-brand" style="justify-content:center; margin-bottom:16px;">
          <span class="brand-icon">🤝</span>
          Community Connect
        </a>
        <h1>Create Account</h1>
        <p>Join the community and start making a difference</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label" for="role">I am a</label>
          <select id="role" class="form-control" required>
            <option value="donor">Donor</option>
            <option value="ngo">NGO / Organization</option>
            <option value="volunteer">Volunteer</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group" id="orgGroup" style="display:none;">
          <label class="form-label" for="organization">Organization Name</label>
          <input type="text" id="organization" class="form-control" placeholder="Your organization">
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone (Optional)</label>
          <input type="tel" id="phone" class="form-control" placeholder="+1 234 567 8900">
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Show/hide organization field based on role
    document.getElementById('role').addEventListener('change', function() {
      document.getElementById('orgGroup').style.display =
        this.value === 'ngo' ? 'block' : 'none';
    });
  </script>
</body>
</html>
